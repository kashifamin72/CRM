services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NewSecureP@ss2024!}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET 10 Web API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-crm_db};Username=${POSTGRES_USER:-crm_user};Password=NewCrmP@ss2024!"
      Jwt__Key: ${JWT_SECRET_KEY:-YourSuperSecretKeyAtLeast32CharactersLong!}
      Jwt__Issuer: ${JWT_ISSUER:-crm.visionplusapps.com}
      Jwt__Audience: ${JWT_AUDIENCE:-crm.visionplusapps.com}
      Jwt__ExpirationInMinutes: ${JWT_EXPIRATION:-60}
      WhatsApp__WebhookUrl: ${WHATSAPP_WEBHOOK_URL:-http://host.docker.internal:5678/webhook/whatsapp-bridge}
      AllowedOrigins: ${ALLOWED_ORIGINS:-https://crm.visionplusapps.com}
    volumes:
      - uploads_data:/app/wwwroot/uploads
      - dataprotection_keys:/app/keys
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - crm-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://crm.visionplusapps.com/api}
    container_name: crm-frontend
    restart: unless-stopped
    networks:
      - crm-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    networks:
      - crm-network

volumes:
  postgres-data:
    external: true
  uploads_data:
    driver: local
  dataprotection_keys:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  crm-network:
    driver: bridge
