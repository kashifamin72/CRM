# Development override - enables hot-reload and auto-rebuild
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # PostgreSQL Database (same as production)
  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  # .NET 10 Web API Backend - Development mode with hot-reload
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    container_name: crm-api-dev
    command: >
      dotnet watch run --no-launch-profile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-crm_db};Username=${POSTGRES_USER:-crm_user};Password=${POSTGRES_PASSWORD:-SecureP@ssw0rd2024!}"
      Jwt__Key: ${JWT_SECRET_KEY:-YourSuperSecretKeyAtLeast32CharactersLong!}
      Jwt__Issuer: ${JWT_ISSUER:-opencode.visionplusapps.com}
      Jwt__Audience: ${JWT_AUDIENCE:-opencode.visionplusapps.com}
      Jwt__ExpirationInMinutes: ${JWT_EXPIRATION:-60}
      WhatsApp__WebhookUrl: ${WHATSAPP_WEBHOOK_URL:-http://host.docker.internal:5678/webhook/whatsapp-bridge}
      AllowedOrigins: ${ALLOWED_ORIGINS:-https://opencode.visionplusapps.com}
    volumes:
      - ./backend:/src
      - uploads_data:/app/wwwroot/uploads
      - dataprotection_keys:/app/keys
      - /src/CRM.Api/bin
      - /src/CRM.Api/obj
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - crm-network
    ports:
      - "127.0.0.1:5000:5000"

  # React Frontend - Development mode with HMR
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    container_name: crm-frontend-dev
    command: npm run dev
    environment:
      - VITE_API_URL=http://localhost/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - crm-network
    ports:
      - "127.0.0.1:5173:5173"

  # Nginx Reverse Proxy (same config)
  nginx:
    container_name: crm-nginx-dev
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    networks:
      - crm-network

volumes:
  postgres-data:
    external: true
  uploads_data:
    driver: local
  dataprotection_keys:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  crm-network:
    driver: bridge
